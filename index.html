<html lang="ru">
<head>

<title>Реактор</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(1100px 500px at 70% -10%, rgba(124,107,255,0.14), transparent 60%),
                radial-gradient(800px 500px at 10% 110%, rgba(61,255,197,0.08), transparent 55%), #05070F;
    font-family: 'Manrope', system-ui, sans-serif; color: #E8ECF8;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 580px; margin: 0 auto; padding: max(26px, env(safe-area-inset-top)) 16px 48px; position: relative; }
  .panel {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(124,107,255,0.16);
    border-radius: 18px; padding: 18px; backdrop-filter: blur(8px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  h1 { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: 26px; margin: 6px 0 14px;
       color: #fff; letter-spacing: 1px; text-shadow: 0 0 24px rgba(124,107,255,0.45); }
  h1 b { color: #7C6BFF; font-weight: 900; }
  h2 { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #C9D2E8; }
  .date { font-size: 11px; color: #5E6B8C; letter-spacing: 3px; text-transform: uppercase; }
  .statusrow { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .lvl { font-family:'Unbounded',sans-serif; font-size: 11px; font-weight: 700; color: #3DFFC5;
         letter-spacing: 1px; text-shadow: 0 0 10px rgba(61,255,197,0.6); }
  .xpbar { width: 120px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08);
           overflow: hidden; border: 1px solid rgba(124,107,255,0.3); }
  .xpbar i { display:block; height:100%; background: linear-gradient(90deg,#7C6BFF,#3DFFC5);
             box-shadow: 0 0 10px rgba(124,107,255,0.8); transition: width .6s ease; }
  .xpnum { font-size: 12px; color: #5E6B8C; }
  .streak { font-size: 12px; font-weight: 800; color: #FF6B35; text-shadow: 0 0 10px rgba(255,107,53,0.6); }
  .combo { font-size: 12px; font-weight: 800; color: #FFB020; text-shadow: 0 0 10px rgba(255,176,32,0.6); }
  .cores { display: flex; gap: 6px; justify-content: space-between; padding: 26px 10px 20px; }
  .core { text-align: center; flex: 1; min-width: 96px; position: relative; }
  .bat { position: relative; width: 72px; height: 140px; margin: 0 auto; }
  .cap { position: absolute; top: 0; left: 50%; transform: translateX(-50%);
         width: 26px; height: 10px; border-radius: 5px 5px 0 0; transition: all .9s ease; }
  .body { position: absolute; top: 10px; left: 0; right: 0; bottom: 0; border-radius: 16px;
          overflow: hidden; background: linear-gradient(180deg,#0B1024,#060814);
          transition: box-shadow .9s ease, border-color .9s ease; }
  .fill { position: absolute; left: 0; right: 0; bottom: 0;
          transition: height .9s cubic-bezier(.22,1,.36,1); }
  .flow { position: absolute; inset: 0; mix-blend-mode: overlay;
          background: repeating-linear-gradient(180deg, rgba(255,255,255,0.22) 0 3px, transparent 3px 14px);
          animation: flowUp 1.6s linear infinite; }
  .meniscus { position: absolute; top: -2px; left: 4px; right: 4px; height: 5px; border-radius: 4px;
              background: rgba(255,255,255,0.7); filter: blur(2px); }
  .tick { position: absolute; right: 4px; width: 9px; height: 1.5px; border-radius: 1px; }
  .pct { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .pct b { font-family:'Unbounded',sans-serif; font-size: 24px; font-weight: 700; color: #fff; }
  .pct s { font-size: 9px; letter-spacing: 2px; color: #fff; opacity: .85; text-decoration: none; }
  .burst { position: absolute; inset: 4px -8px -8px; border-radius: 20px;
           animation: burstRing .8s ease-out forwards; pointer-events: none; }
  .corename { margin-top: 14px; font-family:'Unbounded',sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2.5px; }
  .corehint { font-size: 10.5px; color: #5E6B8C; margin-top: 4px; line-height: 1.4; padding: 0 4px; }
  .mini { width: 30px; height: 30px; border-radius: 15px; cursor: pointer;
          background: rgba(var(--g),0.10); color: rgb(var(--g));
          border: 1px solid rgba(var(--g),0.45); font-size: 16px; line-height: 1;
          font-family: inherit; transition: box-shadow .2s, background .2s; }
  .mini.sm { width: 24px; height: 24px; font-size: 13px; }
  .mini:active, .mini:hover { background: rgba(var(--g),0.22); box-shadow: 0 0 12px rgba(var(--g),0.5); }
  .quest { display: flex; align-items: center; gap: 12px; padding: 12px 16px; }
  .qbar { display: flex; gap: 5px; margin-top: 6px; }
  .qseg { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); transition: all .4s; }
  .qseg.on { background: linear-gradient(90deg,#3DFFC5,#7C6BFF); box-shadow: 0 0 8px rgba(61,255,197,0.6); }
  .qstat { font-family:'Unbounded',sans-serif; font-size: 13px; font-weight: 700; color: #5E6B8C; }
  .qstat.done { color: #3DFFC5; text-shadow: 0 0 10px rgba(61,255,197,0.7); }
  .task { display: flex; align-items: center; gap: 10px; padding: 10px 2px;
          border-bottom: 1px solid rgba(255,255,255,0.05); }
  .check { width: 30px; height: 30px; border-radius: 15px; flex-shrink: 0; cursor: pointer;
           border: 1px solid rgba(255,176,32,0.5); background: rgba(255,176,32,0.10);
           color: #FFB020; font-size: 14px; line-height: 1; font-family: inherit; }
  .tname { font-size: 14px; font-weight: 600; color: #E8ECF8; }
  .badges { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .badge { font-size: 10px; font-weight: 800; letter-spacing: .5px; border-radius: 6px; padding: 2px 8px; }
  .ghost { width: 26px; height: 26px; border-radius: 8px; border: none; background: transparent;
           color: #39435E; cursor: pointer; font-size: 13px; font-family: inherit; }
  .primary { border: 1px solid rgba(124,107,255,0.5); border-radius: 10px;
             background: linear-gradient(135deg, rgba(124,107,255,0.25), rgba(61,255,197,0.15));
             color: #fff; padding: 11px 18px; font-family:'Unbounded',sans-serif;
             font-size: 11px; font-weight: 700; letter-spacing: 1.5px; cursor: pointer;
             box-shadow: 0 0 20px rgba(124,107,255,0.25); }
  .form { margin-top: 12px; padding: 14px; border-radius: 14px;
          background: rgba(124,107,255,0.06); border: 1px solid rgba(124,107,255,0.2); }
  .form input[type=text] { width: 100%; padding: 11px 13px; border-radius: 10px;
          border: 1px solid rgba(124,107,255,0.35); font-size: 16px; font-family: inherit;
          background: #0B1024; color: #E8ECF8; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .ptabs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .ptab { border: none; background: transparent; color: #5E6B8C; border-radius: 8px;
          padding: 5px 10px; font-size: 12px; font-weight: 700; font-family: inherit;
          cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .ptab.on { color: #3DFFC5; border-bottom-color: #3DFFC5;
             text-shadow: 0 0 8px rgba(61,255,197,0.5); }
  .preset { border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.04);
            color: #C9D2E8; border-radius: 20px; padding: 5px 12px; font-size: 12px;
            font-family: inherit; cursor: pointer; transition: all .2s; }
  .preset:hover, .preset:active { border-color: rgba(61,255,197,0.6); color: #3DFFC5;
            box-shadow: 0 0 10px rgba(61,255,197,0.3); }
  .steppers { display: flex; gap: 8px; flex-wrap: wrap; }
  .stepper { display: flex; align-items: center; gap: 7px; border-radius: 10px; padding: 6px 9px; }
  .stepper .nm { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; min-width: 56px; font-family:'Unbounded',sans-serif; }
  .stepper .val { min-width: 32px; text-align: center; font-size: 13px; font-weight: 800; }
  .hintline { font-size: 12px; color: #5E6B8C; margin: 12px 0 8px; }
  .empty { font-size: 13.5px; color: #5E6B8C; margin: 4px 0 14px; line-height: 1.5; }
  .chartbox svg { display: block; width: 100%; height: auto; }
  .legend { display: flex; gap: 14px; margin-top: 8px; justify-content: center; }
  .legend span { font-size: 10px; font-weight: 700; letter-spacing: 1px; }
  .achs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .ach { display: flex; align-items: center; gap: 6px; border-radius: 10px; padding: 6px 10px;
         font-size: 11px; font-weight: 700; border: 1px solid rgba(255,255,255,0.10);
         background: rgba(255,255,255,0.03); color: #39435E; }
  .ach.on { border-color: rgba(255,176,32,0.5); color: #FFB020;
            box-shadow: 0 0 12px rgba(255,176,32,0.25); background: rgba(255,176,32,0.07); }
  .footerbtns { display: flex; gap: 10px; justify-content: center; margin-top: 22px; }
  .footerbtns button { border: 1px solid rgba(255,255,255,0.12); background: transparent;
         color: #5E6B8C; border-radius: 10px; padding: 8px 14px; font-size: 12px;
         font-family: inherit; cursor: pointer; }
  .logtitle { font-size: 10px; color: #5E6B8C; text-transform: uppercase; letter-spacing: 2px; margin: 16px 0 6px; padding: 0 6px; }
  .logline { font-size: 12px; color: #5E6B8C; padding: 3px 6px; display: flex; gap: 10px; }
  .logline time { color: #39435E; font-variant-numeric: tabular-nums; }
  .lvlflash { position: fixed; top: 50%; left: 50%; z-index: 50; transform: translate(-50%,-50%);
              animation: lvlPop 1.6s ease forwards; font-family:'Unbounded',sans-serif;
              font-weight: 900; font-size: 30px; color: #fff; text-align: center;
              text-shadow: 0 0 30px #7C6BFF, 0 0 60px #3DFFC5; pointer-events: none; }
  .lvlflash small { font-size: 15px; color: #3DFFC5; }
  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); z-index: 60;
           background: rgba(11,16,36,0.95); border: 1px solid rgba(255,176,32,0.5);
           color: #FFB020; border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 700;
           box-shadow: 0 0 24px rgba(255,176,32,0.35); animation: toastIn 3s ease forwards; }
  .stars { position: fixed; inset: 0; overflow: hidden; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; opacity: .35; filter: blur(.5px);
          animation: starDrift linear infinite; }
  .low-pulse { animation: lowPulse 1.4s ease-in-out infinite; }
  @keyframes flowUp { from { background-position-y: 0; } to { background-position-y: -28px; } }
  @keyframes lowPulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.5); } }
  @keyframes burstRing { from { transform: scale(.9); opacity: 1; } to { transform: scale(1.35); opacity: 0; } }
  @keyframes starDrift { from { transform: translateY(0); } to { transform: translateY(-140px); } }
  @keyframes lvlPop { 0% { transform: translate(-50%,-50%) scale(.6); opacity: 0; }
    15% { opacity: 1; } 70% { transform: translate(-50%,-50%) scale(1.05); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1.15); opacity: 0; } }
  @keyframes toastIn { 0% { opacity: 0; transform: translate(-50%, 14px); }
    10%,80% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; } }
  button:focus-visible, input:focus-visible { outline: 2px solid #7C6BFF; outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>

<body>
<div class="stars" id="stars" aria-hidden="true"></div>
<div class="wrap" id="app"></div>

<script>
"use strict";
var KEY = "daria-energy-vessels";

var CORES = [
  { id:"energy", name:"ЭНЕРГИЯ", neon:"#FFB020", neon2:"#FF6B35", g:"255,176,32",
    hint:"топливо тела: сон, движение, силы" },
  { id:"spirit", name:"ДУХ", neon:"#3DFFC5", neon2:"#00B8A9", g:"61,255,197",
    hint:"внутренний огонь: смысл, вдохновение, спокойствие" },
  { id:"focus", name:"ФОКУС", neon:"#7C6BFF", neon2:"#3B82F6", g:"124,107,255",
    hint:"луч внимания: ясность ума, концентрация" }
];
var RANKS = ["Искра","Заряд","Импульс","Разряд","Вольтова дуга","Реактор","Ядро","Плазма","Квазар","Сверхновая"];

var PRESET_CATS = [
  { id:"body", name:"💪 Тело", items:[
    { name:"Тренировка",            e:{energy:15,spirit:5,focus:0} },
    { name:"Зарядка утром",         e:{energy:10,spirit:0,focus:5} },
    { name:"Прогулка",              e:{energy:10,spirit:10,focus:0} },
    { name:"Растяжка / йога",       e:{energy:10,spirit:10,focus:0} },
    { name:"Бассейн",               e:{energy:15,spirit:5,focus:0} },
    { name:"Сон вовремя",           e:{energy:20,spirit:0,focus:5} },
    { name:"Ранний подъём",         e:{energy:5,spirit:0,focus:10} },
    { name:"Контрастный душ",       e:{energy:10,spirit:0,focus:0} },
    { name:"Дневной отдых 20 мин",  e:{energy:10,spirit:0,focus:5} },
    { name:"Здоровый обед",         e:{energy:10,spirit:0,focus:0} },
    { name:"День без сладкого",     e:{energy:5,spirit:0,focus:5} },
    { name:"Массаж / баня",         e:{energy:15,spirit:10,focus:0} }
  ]},
  { id:"spirit", name:"🜂 Дух", items:[
    { name:"Медитация",             e:{energy:0,spirit:15,focus:10} },
    { name:"Творчество",            e:{energy:0,spirit:15,focus:0} },
    { name:"Время с близкими",      e:{energy:5,spirit:15,focus:0} },
    { name:"Свидание / романтика",  e:{energy:5,spirit:15,focus:0} },
    { name:"Позвонить родителям",   e:{energy:0,spirit:10,focus:0} },
    { name:"Выйти на природу",      e:{energy:5,spirit:15,focus:0} },
    { name:"Чтение книги",          e:{energy:0,spirit:10,focus:5} },
    { name:"Дневник / рефлексия",   e:{energy:0,spirit:10,focus:5} },
    { name:"Благодарность: 3 пункта", e:{energy:0,spirit:10,focus:0} },
    { name:"Помочь кому-то",        e:{energy:0,spirit:15,focus:0} },
    { name:"Любимая музыка",        e:{energy:5,spirit:10,focus:0} },
    { name:"Побыть в тишине",       e:{energy:0,spirit:10,focus:5} },
    { name:"Час без телефона",      e:{energy:0,spirit:10,focus:10} }
  ]},
  { id:"focus", name:"◎ Фокус", items:[
    { name:"Глубокая работа",       e:{energy:-5,spirit:0,focus:15} },
    { name:"Одна сложная задача",   e:{energy:-10,spirit:0,focus:15} },
    { name:"Стратегическая сессия", e:{energy:-5,spirit:0,focus:15} },
    { name:"Планирование дня",      e:{energy:0,spirit:0,focus:10} },
    { name:"Навести порядок",       e:{energy:0,spirit:5,focus:10} },
    { name:"Закрыть хвосты",        e:{energy:0,spirit:5,focus:10} },
    { name:"Инбокс-ноль",           e:{energy:-5,spirit:0,focus:10} },
    { name:"Обучение / курс",       e:{energy:0,spirit:5,focus:10} },
    { name:"Изучить новый инструмент", e:{energy:0,spirit:5,focus:10} },
    { name:"Разбор почты",          e:{energy:-5,spirit:0,focus:5} },
    { name:"Выключить уведомления", e:{energy:0,spirit:0,focus:10} },
    { name:"Без соцсетей до обеда", e:{energy:0,spirit:5,focus:15} }
  ]},
  { id:"home", name:"🏠 Быт", items:[
    { name:"Уборка дома",           e:{energy:-5,spirit:5,focus:5} },
    { name:"Приготовить ужин",      e:{energy:0,spirit:5,focus:0} },
    { name:"Закупка продуктов",     e:{energy:-5,spirit:0,focus:5} },
    { name:"Оплатить счета",        e:{energy:0,spirit:0,focus:5} },
    { name:"Разобрать гардероб",    e:{energy:0,spirit:5,focus:10} },
    { name:"Уход за растениями",    e:{energy:0,spirit:10,focus:0} }
  ]},
  { id:"drain", name:"🌀 Затратные", items:[
    { name:"Планёрка",              e:{energy:-5,spirit:0,focus:-5} },
    { name:"Сложные переговоры",    e:{energy:-15,spirit:0,focus:10} },
    { name:"Дедлайн-спринт",        e:{energy:-15,spirit:-5,focus:10} },
    { name:"Работа сверхурочно",    e:{energy:-15,spirit:-5,focus:5} },
    { name:"Конфликтный разговор",  e:{energy:-10,spirit:-10,focus:0} },
    { name:"Рутина / отчёты",       e:{energy:-5,spirit:-5,focus:5} },
    { name:"Дорога / пробки",       e:{energy:-10,spirit:0,focus:0} },
    { name:"Публичное выступление", e:{energy:-10,spirit:5,focus:10} }
  ]}
];

var ACHS = [
  { id:"first",   name:"Первая искра", emoji:"✦",  test:function(s){ return s.totalDone >= 1; } },
  { id:"ten",     name:"10 задач",     emoji:"⚡", test:function(s){ return s.totalDone >= 10; } },
  { id:"fifty",   name:"50 задач",     emoji:"💫", test:function(s){ return s.totalDone >= 50; } },
  { id:"streak3", name:"Серия 3 дня",  emoji:"🔥", test:function(s){ return s.streak.count >= 3; } },
  { id:"streak7", name:"Серия неделя", emoji:"🌋", test:function(s){ return s.streak.count >= 7; } },
  { id:"lvl5",    name:"Уровень 5",    emoji:"🚀", test:function(s){ return s.xp >= 400; } },
  { id:"full",    name:"Полный заряд", emoji:"🔋", test:function(s){
      return s.batteries.energy >= 80 && s.batteries.spirit >= 80 && s.batteries.focus >= 80; } }
];

/* ── АВТОПЛАНИРОВЩИК ── */
var PLANNER = {
  size: 5,            // будни: компактный план
  weekendSize: 4,     // выходные: легче
  anchor: [2026, 6, 8], // 08.07.2026 — точка отсчёта директорских дней (раз в 2 недели, среда)
  rituals: [
    { name:"Зарядка утром",     e:{energy:10,spirit:0,focus:5},  weekend:true  },
    { name:"Планирование дня",  e:{energy:0, spirit:0,focus:10}, weekend:false }
  ]
};
function stripTime(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function buildPlan() {
  var now = new Date(); var dow = now.getDay();
  var weekend = (dow === 0 || dow === 6);
  var target = weekend ? PLANNER.weekendSize : PLANNER.size;
  var names = {};
  state.tasks.forEach(function(t){ names[t.name] = 1; });
  state.done.filter(function(t){ return t.doneAt === today(); }).forEach(function(t){ names[t.name] = 1; });
  var added = 0;
  function push(name, e) {
    if (names[name]) return false;
    names[name] = 1; added++;
    state.tasks.push({ id: Date.now() + Math.floor(Math.random()*100000), name: name, effects: Object.assign({}, e) });
    return true;
  }
  /* фиксированные события по расписанию Дарьи */
  if (dow === 3) {
    push("Оперсовет 11:00–13:00", {energy:-10,spirit:0,focus:-5});
    var anchor = new Date(PLANNER.anchor[0], PLANNER.anchor[1], PLANNER.anchor[2]);
    var diffDays = Math.round((stripTime(now) - anchor) / 86400000);
    if (diffDays >= 0 && (diffDays / 7) % 2 === 0)
      push("Директорский день 14:00", {energy:-15,spirit:5,focus:10});
  }
  /* утренние ритуалы */
  PLANNER.rituals.forEach(function(r){ if (!weekend || r.weekend) push(r.name, r.e); });
  /* умный добор: приоритет — самая разряженная батарея; в выходные без рабочего фокуса */
  var catOf = { energy:"body", spirit:"spirit", focus:"focus" };
  function pickFrom(catId) {
    var cat = PRESET_CATS.find(function(c){ return c.id === catId; });
    var pool = cat.items.filter(function(i){ return !names[i.name]; });
    if (!pool.length) return false;
    var p = pool[Math.floor(Math.random() * pool.length)];
    return push(p.name, p.e);
  }
  var guard = 0;
  while (state.tasks.length < target && guard++ < 20) {
    var order = CORES.slice().sort(function(a,b){ return state.batteries[a.id] - state.batteries[b.id]; });
    var ok = false;
    for (var i = 0; i < order.length && !ok; i++) {
      var catId = catOf[order[i].id];
      if (weekend && catId === "focus") ok = pickFrom("home") || pickFrom("spirit");
      else ok = pickFrom(catId);
    }
    if (!ok) break;
  }
  /* в плане всегда есть что-то для Духа */
  if (!state.tasks.some(function(t){ return t.effects.spirit >= 10; })) pickFrom("spirit");
  if (added) pushLog("План дня собран автоматически: +" + added);
  state.planDate = today();
}

var state = load();
var ui = { showForm:false, title:"", effects:{energy:0,spirit:0,focus:0}, bursts:{} };
handleNewDay();
if (state.planDate !== today()) { buildPlan(); save(); }


function load() {
  var def = { batteries:{energy:60,spirit:60,focus:60}, tasks:[], done:[], xp:0, log:[],
              streak:{count:0,lastDate:null}, combo:{count:0,date:null},
              history:[], lastVisit:null, totalDone:0, ach:[], planDate:null };
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) { var p = JSON.parse(raw); for (var k in def) if (!(k in p)) p[k] = def[k]; return p; }
  } catch(e) {}
  return def;
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {} }

function today() { return new Date().toLocaleDateString("ru-RU"); }
function isYesterday(d) { if (!d) return false; var y = new Date(); y.setDate(y.getDate()-1);
  return d === y.toLocaleDateString("ru-RU"); }
function daysBetween(a, b) {
  function toD(s){ var p = s.split("."); return new Date(+p[2], +p[1]-1, +p[0]); }
  return Math.round((toD(b) - toD(a)) / 86400000);
}
function clamp(v) { return Math.max(0, Math.min(100, v)); }
function fmt(v) { return v > 0 ? "+"+v : ""+v; }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function pushLog(text) {
  state.log.unshift({ time: new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}), text: text });
  state.log = state.log.slice(0, 12);
}
function ruDays(n){ var m10=n%10, m100=n%100;
  if (m10===1 && m100!==11) return "день";
  if (m10>=2 && m10<=4 && (m100<10||m100>=20)) return "дня";
  return "дней"; }

/* ── новый день: снимок в историю + ночной саморазряд ── */
function handleNewDay() {
  var d = today();
  if (!state.lastVisit) { state.lastVisit = d; save(); return; }
  if (state.lastVisit === d) return;
  state.history.push({
    date: state.lastVisit,
    energy: state.batteries.energy, spirit: state.batteries.spirit, focus: state.batteries.focus
  });
  state.history = state.history.slice(-14);
  var missed = Math.min(daysBetween(state.lastVisit, d), 3);
  if (missed > 0) {
    var drain = 8 * missed;
    CORES.forEach(function(c){ state.batteries[c.id] = Math.max(5, state.batteries[c.id] - drain); });
    pushLog("Ночной саморазряд: −" + drain + " всем батареям. Доброе утро — пора заряжаться!");
  }
  state.lastVisit = d;
  save();
}

/* ── действия ── */
function adjust(id, d) {
  state.batteries[id] = clamp(state.batteries[id] + d);
  var core = CORES.find(function(c){return c.id===id;});
  pushLog(core.name + ": вручную " + fmt(d));
  if (d > 0) ui.bursts[id] = Date.now();
  checkAchs(); save(); render();
}
function addTask() {
  var name = ui.title.trim(); if (!name) return;
  var hasEff = CORES.some(function(c){ return ui.effects[c.id] !== 0; });
  state.tasks.push({ id: Date.now(), name: name,
    effects: hasEff ? Object.assign({}, ui.effects) : {energy:10,spirit:0,focus:0} });
  ui.title = ""; ui.effects = {energy:0,spirit:0,focus:0}; ui.showForm = false;
  save(); render();
}
function usePreset(cat, i) {
  var p = PRESET_CATS[cat].items[i];
  ui.title = p.name;
  ui.effects = Object.assign({}, p.e);
  render();
  var inp = document.getElementById("taskTitle");
  if (inp) inp.focus();
}
function setPresetCat(i) { ui.presetCat = i; render(); }
function completeTask(id) {
  var t = state.tasks.find(function(x){return x.id===id;}); if (!t) return;
  CORES.forEach(function(c){ if (t.effects[c.id] > 0) ui.bursts[c.id] = Date.now(); });
  for (var k in t.effects) state.batteries[k] = clamp(state.batteries[k] + t.effects[k]);
  var d = today();
  var combo = state.combo.date === d ? state.combo.count + 1 : 1;
  var mult = 1 + Math.min(combo - 1, 5) * 0.2;
  var absSum = 0; for (var k2 in t.effects) absSum += Math.abs(t.effects[k2]);
  var gained = Math.round((10 + absSum / 5) * mult);
  var prevLvl = Math.floor(state.xp / 100);
  state.xp += gained;
  if (Math.floor(state.xp / 100) > prevLvl) flashLevel();
  if (state.streak.lastDate !== d)
    state.streak = { count: isYesterday(state.streak.lastDate) ? state.streak.count + 1 : 1, lastDate: d };
  state.combo = { count: combo, date: d };
  state.totalDone += 1;
  state.tasks = state.tasks.filter(function(x){return x.id!==id;});
  state.done.unshift({ id:t.id, name:t.name, effects:t.effects, doneAt:d, gained:gained });
  state.done = state.done.slice(0, 30);
  pushLog("«" + t.name + "» → +" + gained + " ✦" + (combo > 1 ? " (комбо ×" + mult.toFixed(1) + ")" : ""));
  checkAchs(); save(); render();
}
function undoTask(id) {
  var t = state.done.find(function(x){return x.id===id;}); if (!t) return;
  for (var k in t.effects) state.batteries[k] = clamp(state.batteries[k] - t.effects[k]);
  state.done = state.done.filter(function(x){return x.id!==id;});
  state.tasks.unshift({ id:t.id, name:t.name, effects:t.effects });
  state.xp = Math.max(0, state.xp - (t.gained || 10));
  state.combo.count = Math.max(0, state.combo.count - 1);
  state.totalDone = Math.max(0, state.totalDone - 1);
  pushLog("Возвращено в план: «" + t.name + "»");
  save(); render();
}
function repeatTask(id) {
  var t = state.done.find(function(x){return x.id===id;}); if (!t) return;
  state.tasks.push({ id: Date.now(), name: t.name, effects: Object.assign({}, t.effects) });
  pushLog("В план снова: «" + t.name + "»");
  save(); render();
}
function removeTask(id) {
  state.tasks = state.tasks.filter(function(x){return x.id!==id;});
  save(); render();
}
function stepEffect(id, d) {
  ui.effects[id] = Math.max(-25, Math.min(25, ui.effects[id] + d));
  render();
}
function checkAchs() {
  ACHS.forEach(function(a){
    if (state.ach.indexOf(a.id) === -1 && a.test(state)) {
      state.ach.push(a.id);
      toast(a.emoji + " Достижение: " + a.name + "!");
    }
  });
}
function flashLevel() {
  var lvl = Math.floor(state.xp / 100) + 1;
  var el = document.createElement("div");
  el.className = "lvlflash";
  el.innerHTML = "УРОВЕНЬ " + lvl + "<br><small>ранг: " + RANKS[Math.min(lvl-1, RANKS.length-1)] + "</small>";
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 1700);
}
function toast(text) {
  var el = document.createElement("div");
  el.className = "toast";
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 3100);
}

/* ── резервная копия ── */
function backup() {
  var data = JSON.stringify(state);
  function done(){ toast("💾 Копия скопирована — сохраните её в заметки"); }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(data).then(done, function(){ window.prompt("Скопируйте текст копии:", data); });
  } else { window.prompt("Скопируйте текст копии:", data); }
}
function restore() {
  var raw = window.prompt("Вставьте текст резервной копии:");
  if (!raw) return;
  try {
    var p = JSON.parse(raw);
    if (!p.batteries) throw new Error("нет данных");
    state = p; handleNewDay(); save(); render();
    toast("✓ Данные восстановлены");
  } catch(e) { toast("Не похоже на копию Реактора — проверьте текст"); }
}

/* ── отрисовка ── */
function coreHTML(c) {
  var v = state.batteries[c.id];
  var it = 0.25 + (v / 100) * 0.75;
  var low = v <= 20;
  var burst = ui.bursts[c.id] && (Date.now() - ui.bursts[c.id] < 900)
    ? '<div class="burst" style="border:2px solid rgba('+c.g+',0.9)"></div>' : '';
  return '<div class="core">' +
    '<div class="bat">' +
      '<div class="cap" style="background:rgba('+c.g+','+(0.35+0.5*it)+');box-shadow:0 0 '+(8+v*0.15)+'px rgba('+c.g+','+(0.7*it)+')"></div>' +
      '<div class="body'+(low?' low-pulse':'')+'" style="border:1.5px solid rgba('+c.g+','+(low?0.9:0.35+0.35*it)+');box-shadow:0 0 '+(12+v*0.4)+'px rgba('+c.g+','+(0.5*it)+'),0 0 '+(40+v*0.8)+'px rgba('+c.g+','+(0.18*it)+'),inset 0 0 18px rgba('+c.g+','+(0.18*it)+'),inset 0 2px 4px rgba(255,255,255,0.08)">' +
        '<div class="fill" style="height:'+v+'%;background:linear-gradient(180deg,rgba('+c.g+',0.95),'+c.neon2+');box-shadow:0 0 24px rgba('+c.g+',0.9)">' +
          '<div class="flow"></div><div class="meniscus"></div></div>' +
        [25,50,75].map(function(m){ return '<div class="tick" style="bottom:'+m+'%;background:rgba('+c.g+',0.45)"></div>'; }).join('') +
        '<div class="pct"><b style="text-shadow:0 0 14px rgba('+c.g+',1),0 1px 3px rgba(0,0,0,0.5)">'+v+'</b><s style="text-shadow:0 0 8px rgba('+c.g+',1)">%</s></div>' +
      '</div>' + burst +
    '</div>' +
    '<div class="corename" style="color:'+c.neon+';text-shadow:0 0 12px rgba('+c.g+',0.6)">'+c.name+'</div>' +
    '<div class="corehint">'+c.hint+'</div>' +
    '<div style="display:inline-flex;gap:8px;margin-top:10px">' +
      '<button class="mini" style="--g:'+c.g+'" onclick="adjust(\''+c.id+'\',-5)" aria-label="Убавить">−</button>' +
      '<button class="mini" style="--g:'+c.g+'" onclick="adjust(\''+c.id+'\',5)" aria-label="Прибавить">+</button>' +
    '</div></div>';
}
function badgeHTML(t) {
  return CORES.filter(function(c){return t.effects[c.id]!==0;}).map(function(c){
    return '<span class="badge" style="color:'+c.neon+';background:rgba('+c.g+',0.10);border:1px solid rgba('+c.g+',0.3)">'+c.name+' '+fmt(t.effects[c.id])+'</span>';
  }).join('');
}
function chartHTML() {
  var pts = state.history.slice(-6).concat([{
    date: today(), energy: state.batteries.energy, spirit: state.batteries.spirit, focus: state.batteries.focus
  }]);
  if (pts.length < 2)
    return '<p class="empty" style="margin:8px 0 0">График недели появится, когда накопится пара дней истории.</p>';
  var W = 520, H = 130, pad = 14;
  function x(i){ return pad + i * ((W - 2*pad) / (pts.length - 1)); }
  function y(v){ return H - pad - (v / 100) * (H - 2*pad); }
  function line(id, color) {
    var d = pts.map(function(p,i){ return (i?'L':'M') + x(i).toFixed(1) + ' ' + y(p[id]).toFixed(1); }).join(' ');
    var dots = pts.map(function(p,i){
      return '<circle cx="'+x(i).toFixed(1)+'" cy="'+y(p[id]).toFixed(1)+'" r="3" fill="'+color+'"/>';
    }).join('');
    return '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" style="filter:drop-shadow(0 0 5px '+color+')"/>' + dots;
  }
  var labels = pts.map(function(p,i){
    var parts = p.date.split(".");
    return '<text x="'+x(i).toFixed(1)+'" y="'+(H-1)+'" font-size="9" fill="#5E6B8C" text-anchor="middle">'+parts[0]+'.'+parts[1]+'</text>';
  }).join('');
  var grid = [25,50,75].map(function(v){
    return '<line x1="'+pad+'" y1="'+y(v)+'" x2="'+(W-pad)+'" y2="'+y(v)+'" stroke="rgba(255,255,255,0.06)"/>';
  }).join('');
  return '<div class="chartbox"><svg viewBox="0 0 '+W+' '+H+'" role="img" aria-label="График заряда за неделю">' +
    grid + line("energy","#FFB020") + line("spirit","#3DFFC5") + line("focus","#7C6BFF") + labels +
    '</svg><div class="legend">' +
    '<span style="color:#FFB020">— ЭНЕРГИЯ</span><span style="color:#3DFFC5">— ДУХ</span><span style="color:#7C6BFF">— ФОКУС</span>' +
    '</div></div>';
}
function achsHTML() {
  return '<div class="achs">' + ACHS.map(function(a){
    var on = state.ach.indexOf(a.id) !== -1;
    return '<span class="ach'+(on?' on':'')+'">'+a.emoji+' '+a.name+'</span>';
  }).join('') + '</div>';
}
function render() {
  var lvl = Math.floor(state.xp / 100) + 1;
  var rank = RANKS[Math.min(lvl-1, RANKS.length-1)];
  var prog = state.xp % 100;
  var d = today();
  var comboToday = state.combo.date === d ? state.combo.count : 0;
  var mult = 1 + Math.min(comboToday, 5) * 0.2;
  var doneToday = state.done.filter(function(t){return t.doneAt===d;});
  var quest = Math.min(doneToday.length, 3);
  var dateStr = new Date().toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"});

  var h = '';
  h += '<div style="margin-bottom:20px">';
  h += '<div class="date">'+dateStr+'</div>';
  h += '<h1>РЕАКТОР <b>Дарьи</b></h1>';
  h += '<div class="statusrow">';
  h += '<span class="lvl">LVL '+lvl+' · '+rank.toUpperCase()+'</span>';
  h += '<span class="xpbar"><i style="width:'+prog+'%"></i></span>';
  h += '<span class="xpnum">'+state.xp+' ✦</span>';
  if (state.streak.count > 1) h += '<span class="streak">🔥 серия '+state.streak.count+' '+ruDays(state.streak.count)+'</span>';
  if (comboToday > 1) h += '<span class="combo">комбо ×'+mult.toFixed(1)+'</span>';
  h += '</div></div>';

  h += '<div class="panel cores">' + CORES.map(coreHTML).join('') + '</div>';

  h += '<div class="panel quest" style="margin-top:12px">';
  h += '<span style="font-size:18px">🎯</span><div style="flex:1">';
  h += '<div style="font-size:12px;font-weight:700;color:#C9D2E8">Квест дня: выполнить 3 задачи</div>';
  h += '<div class="qbar">'+[0,1,2].map(function(i){return '<div class="qseg'+(i<quest?' on':'')+'"></div>';}).join('')+'</div></div>';
  h += '<span class="qstat'+(quest===3?' done':'')+'">'+(quest===3?'✓ ГОТОВО':quest+'/3')+'</span></div>';

  h += '<div class="panel" style="margin-top:12px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">';
  h += '<h2>ЗАДАЧИ</h2><span><button class="preset" onclick="buildPlan();save();render()">⟳ собрать день</button></span></div>';
  if (!state.tasks.length && !ui.showForm)
    h += '<p class="empty">Реактору нужно топливо. Добавьте задачу — или возьмите готовую из шаблонов.</p>';
  h += state.tasks.map(function(t){
    return '<div class="task">' +
      '<button class="check" onclick="completeTask('+t.id+')" aria-label="Выполнить">⚡</button>' +
      '<div style="flex:1;min-width:0"><div class="tname">'+esc(t.name)+'</div><div class="badges">'+badgeHTML(t)+'</div></div>' +
      '<button class="ghost" onclick="removeTask('+t.id+')" aria-label="Удалить">✕</button></div>';
  }).join('');
  if (ui.showForm) {
    h += '<div class="form">';
    h += '<input type="text" id="taskTitle" placeholder="Например: тренировка / сложные переговоры" value="'+esc(ui.title)+'"/>';
    h += '<div class="ptabs">'+PRESET_CATS.map(function(c,i){
      return '<button class="ptab'+((ui.presetCat||0)===i?' on':'')+'" onclick="setPresetCat('+i+')">'+c.name+'</button>';
    }).join('')+'</div>';
    h += '<div class="presets">'+PRESET_CATS[ui.presetCat||0].items.map(function(p,i){
      return '<button class="preset" onclick="usePreset('+(ui.presetCat||0)+','+i+')">'+p.name+'</button>';
    }).join('')+'</div>';
    h += '<div class="hintline">Эффект на батареи — плюс заряжает, минус сжигает:</div>';
    h += '<div class="steppers">'+CORES.map(function(c){
      var v = ui.effects[c.id];
      var col = v>0?'#3DFFC5':v<0?'#FF5C7A':'#5E6B8C';
      var sh = v!==0?('text-shadow:0 0 8px '+(v>0?'rgba(61,255,197,0.5)':'rgba(255,92,122,0.5)')):'';
      return '<div class="stepper" style="background:rgba('+c.g+',0.08);border:1px solid rgba('+c.g+',0.25)">' +
        '<span class="nm" style="color:'+c.neon+'">'+c.name+'</span>' +
        '<button class="mini sm" style="--g:'+c.g+'" onclick="stepEffect(\''+c.id+'\',-5)">−</button>' +
        '<span class="val" style="color:'+col+';'+sh+'">'+fmt(v)+'</span>' +
        '<button class="mini sm" style="--g:'+c.g+'" onclick="stepEffect(\''+c.id+'\',5)">+</button></div>';
    }).join('')+'</div>';
    h += '<div style="display:flex;gap:8px;margin-top:14px">';
    h += '<button class="primary" onclick="submitTask()">ЗАРЯДИТЬ ПЛАН</button>';
    h += '<button class="ghost" style="width:auto;padding:0 14px" onclick="ui.showForm=false;render()">Отмена</button></div></div>';
  } else {
    h += '<button class="primary" style="margin-top:8px" onclick="ui.showForm=true;ui.focusForm=true;render()">+ НОВАЯ ЗАДАЧА</button>';
  }
  h += '</div>';

  if (doneToday.length) {
    h += '<div class="panel" style="margin-top:12px"><h2>ВЫПОЛНЕНО СЕГОДНЯ — '+doneToday.length+'</h2><div style="margin-top:6px">';
    h += doneToday.map(function(t){
      return '<div class="task" style="opacity:.7">' +
        '<span class="check" style="background:rgba(61,255,197,0.15);border-color:rgba(61,255,197,0.5);color:#3DFFC5;cursor:default">✓</span>' +
        '<div style="flex:1;font-size:13.5px;color:#C9D2E8;text-decoration:line-through">'+esc(t.name)+
        ' <b style="color:#3DFFC5;text-decoration:none">+'+(t.gained||10)+' ✦</b></div>' +
        '<button class="ghost" style="width:auto;padding:0 8px;font-size:11px" onclick="repeatTask('+t.id+')">ещё раз</button>' +
        '<button class="ghost" style="width:auto;padding:0 8px;font-size:11px" onclick="undoTask('+t.id+')">вернуть</button></div>';
    }).join('');
    h += '</div></div>';
  }

  h += '<div class="panel" style="margin-top:12px"><h2>НЕДЕЛЯ РЕАКТОРА</h2>' + chartHTML() + '</div>';
  h += '<div class="panel" style="margin-top:12px"><h2>ДОСТИЖЕНИЯ</h2>' + achsHTML() + '</div>';

  if (state.log.length) {
    h += '<div class="logtitle">журнал реактора</div>';
    h += state.log.slice(0,6).map(function(l){
      return '<div class="logline"><time>'+l.time+'</time><span>'+esc(l.text)+'</span></div>';
    }).join('');
  }

  h += '<div class="footerbtns">' +
    '<button onclick="backup()">💾 Резервная копия</button>' +
    '<button onclick="restore()">↩ Восстановить</button></div>';

  document.getElementById("app").innerHTML = h;
  var inp = document.getElementById("taskTitle");
  if (inp) {
    inp.addEventListener("input", function(){ ui.title = this.value; });
    inp.addEventListener("keydown", function(e){ if (e.key === "Enter") submitTask(); });
    if (ui.showForm && ui.focusForm) { inp.focus(); ui.focusForm = false; }
  }
}
function submitTask(){ addTask(); }

/* звёзды */
(function(){
  var box = document.getElementById("stars");
  var colors = ["#FFB020","#3DFFC5","#7C6BFF"];
  for (var i = 0; i < 24; i++) {
    var s = document.createElement("span");
    s.className = "star";
    s.style.left = (i*41)%100 + "%";
    s.style.top = (i*67)%100 + "%";
    s.style.width = s.style.height = (i%3 ? 2 : 3) + "px";
    s.style.background = colors[i%3];
    s.style.animationDuration = (14 + (i%7)*3) + "s";
    box.appendChild(s);
  }
})();

checkAchs();
render();
</script>
</body>
</html>
